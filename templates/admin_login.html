{% extends "base.html" %}
{% block title %}Admin Login | TCFL{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:40px auto;padding:32px 28px;border-radius:18px;box-shadow:0 4px 24px rgba(47,79,127,0.08);">
  <h2 style="text-align:center;font-size:2rem;font-weight:800;color:#2f4f7f;margin-bottom:24px;">Admin Login</h2>
  <form method="post" class="form" style="display:flex;flex-direction:column;gap:18px;">
    <div class="form-group" style="display:flex;flex-direction:column;gap:6px;">
      <label for="email" style="font-weight:700;color:#2f4f7f;">Email</label>
      <input name="email" id="email" type="email" required style="padding:12px 16px;border-radius:8px;border:2px solid #e5e7eb;font-size:1rem;box-shadow:0 1px 4px rgba(47,79,127,0.05);transition:border-color 0.2s,box-shadow 0.2s;">
    </div>
    <div class="form-group" style="display:flex;flex-direction:column;gap:6px;">
      <label for="password" style="font-weight:700;color:#2f4f7f;">Password</label>
      <input name="password" id="password" type="password" required style="padding:12px 16px;border-radius:8px;border:2px solid #e5e7eb;font-size:1rem;box-shadow:0 1px 4px rgba(47,79,127,0.05);transition:border-color 0.2s,box-shadow 0.2s;">
    </div>
    <button class="btn btn-primary" type="submit" style="background:linear-gradient(90deg,#2f4f7f,#4f7ccf);color:#fff;font-weight:700;padding:12px 0;border-radius:8px;font-size:1.08rem;box-shadow:0 4px 16px rgba(47,79,127,0.13);transition:background 0.2s,box-shadow 0.2s;">Login</button>
  </form>
</div>
{% endblock %}
